technical_decisions:
  module_system: "ESM (type: module)"
  typescript_config: "strict mode, module: NodeNext, moduleResolution: NodeNext"
  runtime: "Node.js 18+"
  core_packages:
    - playwright (headless crawling)
    - cheerio (HTML parsing/manipulation)
    - postcss + postcss-value-parser (CSS url() extraction)
    - got (HTTP client with stream support)
    - p-limit (concurrency control)
    - jszip (ZIP bundling)
    - srcset (srcset attribute parsing)

